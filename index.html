<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="globals.css">
<link rel="stylesheet" href="styleguide.css">
<link rel="stylesheet" href="style.css">
<title>Overdose Response</title>
</head>
<body>
<main class="onboarding" aria-labelledby="onboarding-title">
  <header class="container-main">
      <div class="ICON" role="img" aria-label="Emergency response location icon">
        <img class="pin-back" src="img/pin-1.svg" alt="">
        <img class="circle" src="img/circle-1.svg" alt="">
        <img class="heart" src="img/heart-1.svg" alt="">
      </div>
  </header>
  <h1 class="text-title" id="onboarding-title">Get help fast during an overdose.</h1>
  <section class="explanation" aria-labelledby="onboarding-description">
    <p class="text-explanation" id="onboarding-description">
      This app lets you call 911 and alert nearby trained responders at the same time.
    </p>
  </section>
  <section class="container" aria-label="How the app helps">
    <ul class="list">
      <li class="div">
        <div class="div-2" aria-hidden="true">
          <img class="phone" src="img/phone-1.svg" alt="">
        </div>
        <span class="text-wrapper">Calls emergency services</span>
      </li>
        <li class="div">
          <div class="vertical-container" aria-hidden="true">
            <img class="feature-icon" src="img/combined pin.svg" alt="">
          </div>
          <span class="text-wrapper">Alerts trained people nearby</span>
        </li>
        <li class="div">
          <div class="div-2" aria-hidden="true">
            <img class="feature-icon" src="img/combined clock.svg" alt="">
          </div>
          <span class="text-wrapper">Takes seconds, no setup needed</span>
        </li>
    </ul>
  </section>
  <div class="button-wrapper">
    <button class="button" type="button" aria-describedby="reassurance">
      <span class="text-label">I understand</span>
    </button>
  </div>
  <footer>
    <p class="text-reassurance" id="reassurance">
      You are never required to respond. This app does not guarantee help will arrive.
    </p>
  </footer>
</main>
</body>
</html>
